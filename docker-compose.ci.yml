name: vibestack-ci

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vibestack
      POSTGRES_PASSWORD: vibestack-ci-password
      POSTGRES_DB: vibestack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibestack"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - default
      - vibestack_apps

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  traefik:
    image: traefik:v3
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --api.dashboard=true
      - --certificatesresolvers.letsencrypt.acme.email=ci@dendrix.ai
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - default
      - vibestack_apps

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      VIBESTACK_PUBLIC_URL: https://vibestack.localhost:8443
      VIBESTACK_BASE_DOMAIN: apps.localhost
      VIBESTACK_COOKIE_DOMAIN: ""
      VIBESTACK_INSTALL_DIR: /workspace
      VIBESTACK_SOURCE_DIR: /opt/vibestack-source
      VIBESTACK_REPO_URL: https://github.com/Dendrix-AI/vibestack.git
      VIBESTACK_UPDATE_CHANNEL: main
      VIBESTACK_DATA_DIR: /var/lib/vibestack
      VIBESTACK_SESSION_SECRET: ci-session-secret-with-enough-length
      VIBESTACK_SECRET_KEY: ci-secret-key-with-enough-length
      DATABASE_URL: postgres://vibestack:vibestack-ci-password@postgres:5432/vibestack
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      VIBESTACK_APP_POSTGRES_HOST: postgres
      VIBESTACK_APP_POSTGRES_PORT: 5432
      POSTGRES_USER: vibestack
      POSTGRES_PASSWORD: vibestack-ci-password
      POSTGRES_DB: vibestack
      REDIS_URL: redis://redis:6379
      RUNTIME_DRIVER: docker
      TRAEFIK_NETWORK: vibestack_ci_apps
      TRAEFIK_ENTRYPOINT: websecure
      TRAEFIK_CERT_RESOLVER: letsencrypt
      VIBESTACK_GATEWAY_AUTH_URL: http://api:3000/api/v1/gateway/forward-auth
      FIRST_ADMIN_EMAIL: admin@example.com
      FIRST_ADMIN_PASSWORD: vibestack-ci-password
      CLOUDFLARE_API_TOKEN: ci-cloudflare-token
      CLOUDFLARE_ZONE_ID: ci-cloudflare-zone
      CLOUDFLARE_TARGET_HOSTNAME: ci.localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=vibestack_ci_default
      - traefik.http.routers.vibestack-api.rule=Host(`vibestack.localhost`) && PathPrefix(`/api`)
      - traefik.http.routers.vibestack-api.entrypoints=websecure
      - traefik.http.routers.vibestack-api.tls=true
      - traefik.http.routers.vibestack-api.tls.certresolver=letsencrypt
      - traefik.http.routers.vibestack-api.priority=100
      - traefik.http.services.vibestack-api.loadbalancer.server.port=3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${VIBESTACK_INSTALL_DIR:-.}:/opt/vibestack-source
      - vibestack_data:/var/lib/vibestack
    networks:
      - default
      - vibestack_apps

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["node", "dist/worker.js"]
    environment:
      NODE_ENV: production
      VIBESTACK_PUBLIC_URL: https://vibestack.localhost:8443
      VIBESTACK_BASE_DOMAIN: apps.localhost
      VIBESTACK_COOKIE_DOMAIN: ""
      VIBESTACK_DATA_DIR: /var/lib/vibestack
      VIBESTACK_SESSION_SECRET: ci-session-secret-with-enough-length
      VIBESTACK_SECRET_KEY: ci-secret-key-with-enough-length
      DATABASE_URL: postgres://vibestack:vibestack-ci-password@postgres:5432/vibestack
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      VIBESTACK_APP_POSTGRES_HOST: postgres
      VIBESTACK_APP_POSTGRES_PORT: 5432
      POSTGRES_USER: vibestack
      POSTGRES_PASSWORD: vibestack-ci-password
      POSTGRES_DB: vibestack
      REDIS_URL: redis://redis:6379
      RUNTIME_DRIVER: docker
      TRAEFIK_NETWORK: vibestack_ci_apps
      TRAEFIK_ENTRYPOINT: websecure
      TRAEFIK_CERT_RESOLVER: letsencrypt
      VIBESTACK_GATEWAY_AUTH_URL: http://api:3000/api/v1/gateway/forward-auth
      FIRST_ADMIN_EMAIL: admin@example.com
      FIRST_ADMIN_PASSWORD: vibestack-ci-password
      CLOUDFLARE_API_TOKEN: ci-cloudflare-token
      CLOUDFLARE_ZONE_ID: ci-cloudflare-zone
      CLOUDFLARE_TARGET_HOSTNAME: ci.localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - vibestack_data:/var/lib/vibestack
    networks:
      - default
      - vibestack_apps

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    labels:
      - traefik.enable=true
      - traefik.docker.network=vibestack_ci_default
      - traefik.http.routers.vibestack-web.rule=Host(`vibestack.localhost`)
      - traefik.http.routers.vibestack-web.entrypoints=websecure
      - traefik.http.routers.vibestack-web.tls=true
      - traefik.http.routers.vibestack-web.tls.certresolver=letsencrypt
      - traefik.http.routers.vibestack-web.priority=10
      - traefik.http.services.vibestack-web.loadbalancer.server.port=80
    networks:
      - default

volumes:
  postgres_data:
  vibestack_data:
  letsencrypt:

networks:
  default:
    name: vibestack_ci_default
  vibestack_apps:
    name: vibestack_ci_apps
